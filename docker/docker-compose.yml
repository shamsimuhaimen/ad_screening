services:
  postgres:
    image: postgres:16
    container_name: ad-screening-postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    container_name: ad-screening-prefect-server
    restart: unless-stopped
    env_file:
      - .env.postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4200:4200"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - >
        export PREFECT_API_DATABASE_CONNECTION_URL="postgresql+asyncpg://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}";
        prefect server start --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
