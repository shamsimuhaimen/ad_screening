cohorts:
  - name: default
    controls_per_ad: 2
    min_global_expression: 1.0e-6

ablations:
  - embedding
  - random_embedding
  - label_shuffle

baselines:
  - name: observed_ad
    replicates: 1
  - name: permute_labels
    replicates: 100
  - name: random_matched_set
    replicates: 100
  - name: random_matched_set_plus_bias
    replicates: 100

seeds:
  - 42
  - 43
  - 44

analysis:
  probe_test_size: 0.2
  probe_epochs: 200
  probe_lr: 0.05
  probe_l2: 1.0e-3
  ppi_path: data/processed/string_gene_edges.tsv
  ppi_source_col: gene1
  ppi_target_col: gene2
  ppi_score_col: combined_score
  ppi_min_score: 700
  n_permutations: 500
  permute_mode: degree_matched
  degree_bins: 10
  hops: "1,2,5"
  cosine_permute_mode: degree_matched

annotation_counts_csv: data/processed/gene_annotation_counts.csv
